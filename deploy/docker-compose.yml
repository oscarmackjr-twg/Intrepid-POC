# Local / test run: app + Postgres + Vite frontend
# From repo root: docker compose -f deploy/docker-compose.yml up -d

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    working_dir: /app/backend
    volumes:
      - ../backend:/app/backend           # hot reload; pip packages at /usr/local/lib are safe
      - ../backend/data/sample:/data/sample:ro  # read-only sample data
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/intrepid_poc
      SECRET_KEY: change-me-in-production
      CORS_ORIGINS: '["http://localhost:8000","http://localhost:5173"]'
      STORAGE_TYPE: local
      DEV_INPUT: /data/sample/files_required
      DEV_OUTPUT: /tmp/dev_output
      DEV_OUTPUT_SHARED: /tmp/dev_output_share
    command: >
      sh -c "alembic upgrade head && exec uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intrepid_poc
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    image: node:20-slim
    working_dir: /app/frontend
    volumes:
      - ../frontend:/app/frontend         # source code; HMR watches this
      - /app/frontend/node_modules        # anonymous volume preserves Linux-built binaries
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://app:8000
    command: sh -c "npm ci && npm run dev -- --host"
    depends_on:
      - app

volumes:
  pgdata:
